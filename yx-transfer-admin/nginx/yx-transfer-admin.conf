# 放到 /usr/local/nginx/conf/conf.d/yx-transfer-admin.conf
# 对外访问: http://<nginx-ip>/yx-admin/
upstream yx_transfer_admin_py {
    server 127.0.0.1:18098;
}

server {
    listen 18080;
    server_name _;

    access_log /usr/local/nginx/logs/yx-transfer-admin.access.log;
    error_log  /usr/local/nginx/logs/yx-transfer-admin.error.log;

    location /yx-admin/ {
        proxy_pass http://yx_transfer_admin_py/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
